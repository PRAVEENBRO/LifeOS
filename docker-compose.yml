services:
  api:
    build:
      context: ./backend
    container_name: node_api
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env.docker
    depends_on:
      - postgres

  postgres:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: docker_crud
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
